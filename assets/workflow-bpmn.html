<title>SEO Content Engine - Workflow Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .container { max-width: 1600px; margin: 0 auto; padding: 40px 32px; }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; letter-spacing: -0.01em; }
  .subtitle { font-size: 13px; color: #64748b; margin-bottom: 32px; }
  .diagram-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  svg { display: block; }
  .lane-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; fill: #fff; }
  .node-label { font-size: 11px; fill: #1e293b; text-anchor: middle; dominant-baseline: central; font-weight: 600; }
  .node-sub { font-size: 9.5px; fill: #64748b; text-anchor: middle; dominant-baseline: central; }
  .gate-label { font-size: 10.5px; fill: #92400e; text-anchor: middle; dominant-baseline: central; font-weight: 700; }
  .gate-sub { font-size: 9px; fill: #b45309; text-anchor: middle; dominant-baseline: central; }
  .connector-label { font-size: 10px; fill: #4338ca; text-anchor: middle; dominant-baseline: central; font-weight: 600; }
  .connector-sub { font-size: 9px; fill: #6366f1; text-anchor: middle; dominant-baseline: central; }
  .flow-label { font-size: 8.5px; fill: #64748b; text-anchor: middle; font-style: italic; }
  .score-label { font-size: 9px; font-weight: 700; text-anchor: middle; }
  .legend { display: flex; gap: 28px; margin-top: 24px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #475569; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
</style>

<div class="container">
  <h1>Article Production Workflow</h1>
  <p class="subtitle">3-lane BPMN: User provides keyword and reviews at two gates. Engine writes, optimizes, and scores autonomously. MCP connectors enhance with real data.</p>

  <div class="diagram-wrap">
    <svg viewBox="0 0 1600 900" width="1600" height="900" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#dc2626"/>
        </marker>
        <marker id="arrow-mcp" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#6366f1" fill-opacity="0.6"/>
        </marker>
        <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
          <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-opacity="0.07"/>
        </filter>
      </defs>

      <!-- USER lane: y=0, h=160 -->
      <rect x="0" y="0" width="1600" height="160" rx="0" fill="#fffbeb" fill-opacity="0.5" stroke="#fbbf24" stroke-opacity="0.25"/>
      <rect x="0" y="0" width="40" height="160" fill="#f59e0b"/>
      <text x="20" y="80" class="lane-label" text-anchor="middle" transform="rotate(-90,20,80)">USER</text>

      <!-- ENGINE lane: y=164, h=430 -->
      <rect x="0" y="164" width="1600" height="430" rx="0" fill="#ecfeff" fill-opacity="0.3" stroke="#0891b2" stroke-opacity="0.15"/>
      <rect x="0" y="164" width="40" height="430" fill="#0891b2"/>
      <text x="20" y="379" class="lane-label" text-anchor="middle" transform="rotate(-90,20,379)">ENGINE</text>

      <!-- MCP lane: y=598, h=160 -->
      <rect x="0" y="598" width="1600" height="160" rx="0" fill="#eef2ff" fill-opacity="0.4" stroke="#6366f1" stroke-opacity="0.2"/>
      <rect x="0" y="598" width="40" height="160" fill="#6366f1"/>
      <text x="20" y="678" class="lane-label" text-anchor="middle" transform="rotate(-90,20,678)">MCP</text>

      <!-- Start event -->
      <circle cx="90" cy="80" r="16" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
      <circle cx="90" cy="80" r="6" fill="#f59e0b"/>

      <!-- Provide Keyword -->
      <rect x="130" y="48" width="140" height="64" rx="10" fill="#fff" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="200" y="73" class="gate-label" fill="#92400e">Provide Keyword</text>
      <text x="200" y="90" class="gate-sub">topic or keyword</text>

      <!-- Review Gate #1 -->
      <rect x="470" y="42" width="160" height="76" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>
      <text x="550" y="70" class="gate-label">Review Gate #1</text>
      <text x="550" y="88" class="gate-sub">Approve Brief (~5 min)</text>

      <!-- Review Gate #2 -->
      <rect x="1120" y="42" width="160" height="76" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>
      <text x="1200" y="70" class="gate-label">Review Gate #2</text>
      <text x="1200" y="88" class="gate-sub">Approve Article (~10 min)</text>

      <!-- End event -->
      <circle cx="1530" cy="80" r="16" fill="#fff" stroke="#f59e0b" stroke-width="3.5"/>
      <circle cx="1530" cy="80" r="7" fill="#f59e0b"/>

      <!-- User flow arrows -->
      <line x1="106" y1="80" x2="128" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="1280" y1="80" x2="1512" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Load Context -->
      <rect x="100" y="260" width="140" height="64" rx="8" fill="#fff" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="170" y="284" class="node-label">Load Context</text>
      <text x="170" y="302" class="node-sub">6 context files</text>

      <!-- Generate Brief -->
      <rect x="290" y="260" width="160" height="64" rx="8" fill="#fff" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="370" y="284" class="node-label">Generate Brief</text>
      <text x="370" y="302" class="node-sub">SERP analysis, outline, EEAT plan</text>

      <!-- Write Article -->
      <rect x="640" y="260" width="150" height="64" rx="8" fill="#fff" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="715" y="284" class="node-label">Write Article</text>
      <text x="715" y="302" class="node-sub">1500-4000 words, SEO+GEO</text>

      <!-- SEO Optimize -->
      <rect x="820" y="260" width="130" height="64" rx="8" fill="#fff" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="885" y="284" class="node-label">SEO Optimize</text>
      <text x="885" y="302" class="node-sub">25-point checklist</text>

      <!-- GEO Optimize -->
      <rect x="978" y="260" width="130" height="64" rx="8" fill="#fff" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="1043" y="284" class="node-label">GEO Optimize</text>
      <text x="1043" y="302" class="node-sub">12-point checklist</text>

      <!-- Quality Gate (diamond) -->
      <polygon points="1170,292 1210,250 1250,292 1210,334" fill="#fff" stroke="#0891b2" stroke-width="2.5" filter="url(#shadow)"/>
      <text x="1210" y="286" class="node-label" font-size="10">Quality</text>
      <text x="1210" y="300" class="node-label" font-size="10">Gate</text>
      <text x="1210" y="316" class="node-sub" font-size="8.5">0-100</text>

      <!-- Publish -->
      <rect x="1340" y="260" width="140" height="64" rx="8" fill="#fff" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="1410" y="284" class="node-label">Publish</text>
      <text x="1410" y="302" class="node-sub">CMS draft or Markdown</text>

      <!-- Update Clusters -->
      <rect x="1360" y="380" width="130" height="50" rx="8" fill="#fff" stroke="#0891b2" stroke-width="1.2" filter="url(#shadow)"/>
      <text x="1425" y="400" class="node-label" font-size="10">Update Clusters</text>
      <text x="1425" y="416" class="node-sub">Mark keyword published</text>

      <!-- Keyword down to Load Context -->
      <line x1="200" y1="112" x2="200" y2="258" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Load Context to Generate Brief -->
      <line x1="240" y1="292" x2="288" y2="292" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Generate Brief up to Review Gate #1 -->
      <line x1="450" y1="292" x2="470" y2="292" stroke="#94a3b8" stroke-width="1.5"/>
      <path d="M 460,292 L 460,120 L 468,120" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

      <!-- Review Gate #1 down to Write Article -->
      <path d="M 630,80 L 660,80 L 660,258" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

      <!-- Write Article to SEO Optimize -->
      <line x1="790" y1="292" x2="818" y2="292" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- SEO to GEO -->
      <line x1="950" y1="292" x2="976" y2="292" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- GEO to Quality Gate -->
      <line x1="1108" y1="292" x2="1168" y2="292" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- QG PASS: up to Review Gate #2 -->
      <path d="M 1250,292 L 1280,292 L 1280,120 L 1200,120" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
      <text x="1290" y="210" class="score-label" fill="#16a34a" text-anchor="start">&gt;=80</text>

      <!-- QG FAIL: loop back to Write Article -->
      <path d="M 1210,334 L 1210,420 L 680,420 L 680,326" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow-red)"/>
      <text x="945" y="412" class="score-label" fill="#dc2626">&lt;80 (max 3x)</text>

      <!-- Review Gate #2 down to Publish -->
      <path d="M 1200,118 L 1340,118 L 1340,292 L 1338,292" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

      <!-- Publish to Update Clusters -->
      <path d="M 1410,324 L 1410,378" stroke="#94a3b8" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

      <!-- Publish up to End -->
      <path d="M 1480,292 L 1530,292 L 1530,98" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

      <!-- Ahrefs / SEMrush -->
      <rect x="240" y="640" width="180" height="64" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="330" y="664" class="connector-label">Ahrefs / SEMrush</text>
      <text x="330" y="682" class="connector-sub">keyword data, SERP features</text>

      <!-- Google Search Console -->
      <rect x="700" y="640" width="200" height="64" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="800" y="664" class="connector-label">Google Search Console</text>
      <text x="800" y="682" class="connector-sub">rankings, clicks, CTR</text>

      <!-- Webflow / WordPress -->
      <rect x="1280" y="640" width="180" height="64" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="1370" y="664" class="connector-label">Webflow / WordPress</text>
      <text x="1370" y="682" class="connector-sub">publish draft to CMS</text>

      <!-- Brief to Ahrefs -->
      <line x1="330" y1="324" x2="330" y2="638" stroke="#6366f1" stroke-width="1" stroke-dasharray="5,3" stroke-opacity="0.45" marker-end="url(#arrow-mcp)"/>
      <text x="300" y="500" class="flow-label" fill="#6366f1" transform="rotate(-90,300,500)">enhances brief</text>

      <!-- CMS from Publish -->
      <line x1="1380" y1="324" x2="1375" y2="638" stroke="#6366f1" stroke-width="1" stroke-dasharray="5,3" stroke-opacity="0.45" marker-end="url(#arrow-mcp)"/>
      <text x="1400" y="500" class="flow-label" fill="#6366f1" transform="rotate(-90,1400,500)">draft publish</text>

      <!-- Timing bar -->
      <rect x="50" y="790" width="1500" height="26" rx="4" fill="#f1f5f9" fill-opacity="0.6"/>
      <text x="800" y="807" font-size="11" fill="#64748b" text-anchor="middle" font-family="-apple-system, sans-serif">
        Claude: ~45 min autonomous  |  User: ~15 min (2 review gates)  |  MCP connectors: optional, improve quality
      </text>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#f59e0b"></div> User actions and review gates</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#0891b2"></div> Engine (autonomous processing)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#6366f1"></div> MCP connectors (optional)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dc2626"></div> Quality gate fail loop (max 3x)</div>
  </div>
</div>
